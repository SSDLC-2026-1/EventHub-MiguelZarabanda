name: Create issue on push to main

on:
    push:
        branches:
        - main

permissions:
    issues: write
    contents: read

jobs:
    create-issue:
        runs-on: ubuntu-latest
        steps:
          - name: Create issue
            uses: actions/github-script@v7
            with:
              script: |
                github.rest.issues.create({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    title: 'Nuevo seguimiento automatico',
                    body: 'Se detecto un push en la rama main.
                    Revise los cambios realizados.'
                })